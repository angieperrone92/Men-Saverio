<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saverio Menu - Gestione</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #d9534f; margin-bottom: 30px; }
        .piatto { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; }
        .piatto span { font-size: 1.1em; font-weight: 500; }
        input { width: 80px; padding: 8px; border: 2px solid transparent; border-radius: 6px; text-align: right; font-weight: bold; font-size: 1em; background: #f9f9f9; }
        input:enabled { border-color: #0275d8; background: #fff; }
        .controlli { margin-top: 30px; display: flex; flex-direction: column; gap: 15px; }
        button { padding: 15px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; font-size: 1em; transition: 0.3s; }
        .btn-settings { background: #6c757d; color: white; }
        .btn-save { background: #5cb85c; color: white; display: none; }
        .badge-admin { background: #f0ad4e; color: white; text-align: center; padding: 5px; border-radius: 5px; font-size: 0.8em; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🍕 Saverio Menu</h1>
    <div id="admin-badge" class="badge-admin">MODALITÀ MODIFICA ATTIVA</div>
    
    <div id="lista-piatti">
        <p style="text-align: center;">Caricamento menu in corso...</p>
    </div>

    <div class="controlli">
        <button id="btn-login" class="btn-settings" onclick="attivaModifica()">⚙️ Gestione (Password)</button>
        <button id="btn-save" class="btn-save" onclick="salvaNuoviPrezzi()">💾 Salva e Aggiorna</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // Dati presi dal tuo screenshot
    const firebaseConfig = {
        apiKey: "AIzaSyCuiLRkkFHtUE7Szm343zl-4Gh08zdjqOA",
        authDomain: "saverio-menu.firebaseapp.com",
        projectId: "saverio-menu",
        storageBucket: "saverio-menu.firebasestorage.app",
        messagingSenderId: "351944399414",
        appId: "1:351944399414:web:89ca914f6e673b93751697",
        databaseURL: "https://saverio-menu-default-rtdb.europe-west1.firebasedatabase.app" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const PWD_SECRET = "Believeit92!";

    // 1. CARICAMENTO DATI
    onValue(ref(db, 'menu/prezzi'), (snapshot) => {
        const data = snapshot.val() || { "Pizza Margherita": 7, "Pizza Diavola": 8.5, "Pizza Capricciosa": 9, "Acqua": 2 };
        const container = document.getElementById('lista-piatti');
        container.innerHTML = "";

        for (let nome in data) {
            container.innerHTML += `
                <div class="piatto">
                    <span>${nome}</span>
                    <div>
                        <input type="number" step="0.50" class="prezzo-input" data-id="${nome}" value="${data[nome]}" disabled> €
                    </div>
                </div>`;
        }
    });

    // 2. FUNZIONE SBLOCCO (PASSWORD)
    window.attivaModifica = function() {
        const inputPsw = prompt("Inserisci la password amministratore:");
        if (inputPsw === PWD_SECRET) {
            document.querySelectorAll('.prezzo-input').forEach(i => i.disabled = false);
            document.getElementById('btn-save').style.display = 'block';
            document.getElementById('admin-badge').style.display = 'block';
            document.getElementById('btn-login').style.display = 'none';
        } else {
            alert("Password errata! Accesso negato.");
        }
    };

    // 3. SALVATAGGIO SU FIREBASE
    window.salvaNuoviPrezzi = function() {
        const inputs = document.querySelectorAll('.prezzo-input');
        const nuoviPrezzi = {};

        inputs.forEach(i => {
            nuoviPrezzi[i.dataset.id] = parseFloat(i.value);
        });

        set(ref(db, 'menu/prezzi'), nuoviPrezzi)
            .then(() => {
                alert("Prezzi aggiornati con successo!");
                location.reload(); // Ricarica per bloccare di nuovo i campi
            })
            .catch(err => alert("Errore nel salvataggio: " + err.message));
    };
</script>

</body>
</html>
